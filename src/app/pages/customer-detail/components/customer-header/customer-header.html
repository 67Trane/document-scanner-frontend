<header class="bg-amber-100/80 dark:bg-slate-900/70 backdrop-blur-xl border-b border-amber-200/70 dark:border-slate-800/50 sticky top-0 z-50 shadow-sm transition-colors duration-300">
  <div class="max-w-[1600px] mx-auto px-6 lg:px-8 py-3">
    <div class="flex items-center justify-between">

      <!-- Left: back button + customer name -->
      <div class="flex items-center gap-3">
        <button
          type="button"
          (click)="goHome()"
          class="inline-flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-stone-200/70 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white border border-transparent hover:border-stone-300 dark:hover:border-slate-700 transition-all duration-200"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
          </svg>
          Zurück
        </button>

        <div class="w-px h-5 bg-stone-300 dark:bg-slate-700"></div>

        <span class="text-base font-bold text-slate-900 dark:text-white">{{ fullName() || "Lade…" }}</span>
      </div>

      <!-- Right: username + theme toggle -->
      <div class="flex items-center gap-2">
        @if (username()) {
          <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-xl bg-stone-100 dark:bg-slate-800 border border-stone-200 dark:border-slate-700">
            <div class="w-6 h-6 rounded-full bg-gradient-to-br from-slate-400 to-slate-500 flex items-center justify-center text-white text-[10px] font-bold">
              {{ username().charAt(0).toUpperCase() }}
            </div>
            <span class="text-sm font-medium text-slate-700 dark:text-slate-200">{{ username() }}</span>
          </div>
        }

        <button
          type="button"
          (click)="theme.toggle()"
          class="p-2 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-stone-200/70 dark:hover:bg-slate-800 border border-transparent hover:border-stone-300 dark:hover:border-slate-700 transition-all"
          [title]="theme.isDark() ? 'Hellmodus' : 'Dunkelmodus'"
        >
          @if (theme.isDark()) {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07l-.71.71M6.34 17.66l-.71.71m12.02 0l-.71-.71M6.34 6.34l-.71-.71M12 5a7 7 0 100 14A7 7 0 0012 5z"/>
            </svg>
          } @else {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
            </svg>
          }
        </button>
      </div>

    </div>
  </div>
</header>
